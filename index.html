<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Events Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<style>
  :root{
    --bg:#0f1117; --panel:#181b24; --panel2:#1f2330; --text:#e8eaf0; --muted:#9aa0b0;
    --accent:#6c8cff; --cafe:#e74c3c; --popup:#a55eea; --exhibit:#3498db; --music:#2ecc71; --idol:#f39c12; --stage:#1abc9c; --classic:#c0876a; --other:#8395a7;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden;}
  header{padding:10px 16px; background:var(--panel); display:flex; align-items:center; gap:12px; flex-wrap:wrap; border-bottom:1px solid #2a2f3e; z-index:1002;}
  header h1{font-size:17px; font-weight:700; white-space:nowrap;}
  header h1 span{color:var(--accent);}
  #search{background:var(--panel2); border:1px solid #2a2f3e; color:var(--text); padding:7px 12px; border-radius:8px; width:220px; font-size:13px;}
  #search:focus{outline:1px solid var(--accent);}
  .chips{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{padding:5px 11px; border-radius:20px; font-size:12px; cursor:pointer; background:var(--panel2); border:1px solid #2a2f3e; color:var(--muted); user-select:none; white-space:nowrap;}
  .chip.on{color:#fff; border-color:transparent;}
  .chip[data-cat=cafe].on{background:var(--cafe);} .chip[data-cat=popup].on{background:var(--popup);}
  .chip[data-cat=exhibit].on{background:var(--exhibit);} .chip[data-cat=music].on{background:var(--music);}
  .chip[data-cat=idol].on{background:var(--idol);} .chip[data-cat=other].on{background:var(--other);}
  .chip[data-cat=stage].on{background:var(--stage);} .chip[data-cat=classic].on{background:var(--classic);}
  .chip[data-when].on, .chip[data-src].on{background:var(--accent);}
  .sep{width:1px; height:22px; background:#2a2f3e;}
  #main{flex:1; display:flex; min-height:0;}
  #sidebar{width:340px; background:var(--panel); overflow-y:auto; border-right:1px solid #2a2f3e; flex-shrink:0;}
  #count{padding:10px 14px; font-size:12px; color:var(--muted); position:sticky; top:0; background:var(--panel); border-bottom:1px solid #2a2f3e;}
  .card{display:flex; gap:10px; padding:10px 12px; border-bottom:1px solid #232838; cursor:pointer;}
  .card:hover{background:var(--panel2);}
  .card img{width:86px; height:52px; object-fit:cover; border-radius:6px; background:#2a2f3e; flex-shrink:0;}
  .card .t{font-size:12.5px; font-weight:600; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .card .m{font-size:11px; color:var(--muted); margin-top:3px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;}
  .badge{display:inline-block; font-size:10px; padding:1px 7px; border-radius:10px; color:#fff; margin-right:5px;}
  .st-now{color:#2ecc71;} .st-soon{color:#f39c12;} .st-end{color:#777;}
  #map{flex:1; min-width:0;}
  .leaflet-popup-content-wrapper{background:var(--panel2); color:var(--text); border-radius:10px;}
  .leaflet-popup-tip{background:var(--panel2);}
  .pop{width:240px;}
  .pop img{width:100%; border-radius:8px; margin-bottom:6px;}
  .pop .t{font-weight:700; font-size:13px; line-height:1.4; margin-bottom:5px;}
  .pop .v{font-size:11.5px; color:var(--muted); margin-bottom:3px;}
  .pop a{color:var(--accent); font-size:12px;}
  .approx{font-size:10px; color:#c9a227;}
  #toggleList{display:none;}
  @media (max-width:760px){
    #sidebar{position:absolute; z-index:1001; height:calc(100% - 0px); width:85%; max-width:340px; transform:translateX(-100%); transition:transform .2s; top:0;}
    #sidebar.open{transform:translateX(0);}
    #main{position:relative;}
    #toggleList{display:inline-block;}
    #search{width:140px;}
  }
</style>
</head>
<body>
<header>
  <h1>Tokyo <span>Events</span> Map</h1>
  <button class="chip" id="toggleList">☰ リスト</button>
  <input id="search" type="text" placeholder="検索 (作品名・場所...)">
  <div class="chips" id="catChips">
    <div class="chip on" data-cat="cafe">☕ カフェ</div>
    <div class="chip on" data-cat="popup">🛍 ポップアップ</div>
    <div class="chip on" data-cat="exhibit">🖼 展示会</div>
    <div class="chip on" data-cat="music">🎵 ライブ</div>
    <div class="chip on" data-cat="idol">🎤 アイドル</div>
    <div class="chip on" data-cat="stage">🎭 舞台</div>
    <div class="chip on" data-cat="classic">🎻 クラシック</div>
    <div class="chip on" data-cat="other">✨ その他</div>
  </div>
  <div class="sep"></div>
  <div class="chips" id="whenChips">
    <div class="chip on" data-when="all">すべて</div>
    <div class="chip" data-when="now">開催中</div>
    <div class="chip" data-when="weekend">今週末</div>
    <div class="chip" data-when="upcoming">今後</div>
  </div>
  <div class="sep"></div>
  <div class="chips" id="srcChips">
    <div class="chip on" data-src="cc">コラボカフェ</div>
    <div class="chip on" data-src="lp">LivePocket</div>
    <div class="chip on" data-src="ep">eplus</div>
    <div class="chip on" data-src="lt">ローチケ</div>
    <div class="chip on" data-src="pia">ぴあ</div>
  </div>
</header>
<div id="main">
  <div id="sidebar"><div id="count"></div><div id="list"></div></div>
  <div id="map"></div>
</div>

const VENUE_KEYS = Object.keys(GEO_VENUES).sort((a,b)=>b.length-a.length);
const AREA_KEYS = Object.keys(GEO_AREAS).sort((a,b)=>b.length-a.length);

function normalize(s){ return (s||"").replace(/[’´`]/g,"'"); }
function geocode(venue, title){
  const v = normalize(venue), t = normalize(title);
  // prefer the Tokyo segment of multi-city venue strings like 【東京/渋谷】◯◯
  const tokyoSeg = (v.match(/[【\[]東京[^】\]]*[】\]]\s*([^【\[]+)/)||[])[1] || "";
  for (const src of [tokyoSeg, v, t]){
    if (!src) continue;
    for (const k of VENUE_KEYS) if (src.includes(normalize(k))) return {ll:GEO_VENUES[k], approx:false, at:k};
  }
  for (const src of [tokyoSeg, v, t]){
    if (!src) continue;
    for (const k of AREA_KEYS) if (src.includes(k)) return {ll:GEO_AREAS[k], approx:true, at:k+"エリア"};
  }
  return {ll:[35.6812,139.7671], approx:true, at:"都内 (位置不明)"};
}

// ---------- Normalize both sources into one event list ----------
const CAT_LABEL = {cafe:"カフェ", popup:"ポップアップ", exhibit:"展示会", music:"ライブ", idol:"アイドル", stage:"舞台", classic:"クラシック", other:"その他"};
const CAT_COLOR = {cafe:"#e74c3c", popup:"#a55eea", exhibit:"#3498db", music:"#2ecc71", idol:"#f39c12", stage:"#1abc9c", classic:"#c0876a", other:"#8395a7"};

function ccCat(c, title){
  if (c==="cafe") return "cafe";
  if (c==="pop-up-store") return "popup";
  if (c==="gengaten-tenjikai") return "exhibit";
  if (/カフェ/.test(title)) return "cafe";
  if (/展|ミュージアム/.test(title)) return "exhibit";
  return "other";
}
function lpCat(g, v, t){
  const s = g+" "+v+" "+t;
  if (/アイドル|握手|お渡し会|チェキ/.test(s)) return "idol";
  if (/音楽|フェス|LIVE|ライブ|TOUR|ONE MAN|DJ/i.test(s)) return "music";
  return "other";
}

const EVENTS = [];
(window.EVENTS_CC||[]).forEach((r,idx)=>{
  const [title, slug, img, cat, venue, d1, d2] = r;
  const url = slug.startsWith("/") ? "https://collabo-cafe.com"+slug+"/" : "https://collabo-cafe.com/events/collabo/"+slug+"/";
  EVENTS.push({
    id:"cc"+idx, src:"cc", title, url,
    img: img ? "https://collabo-cafe.com/wp-content/uploads/"+img : null,
    cat: ccCat(cat,title), venue: venue||"", d1, d2
  });
});
(window.EVENTS_LP||[]).forEach((e,idx)=>{
  let img = e.i || "";
  if (img && !img.startsWith("http")) img = img.startsWith("/") ? "https://t.livepocket.jp"+img : "https://cdn.livepocket.jp/c!/a=0,u=0,w=233/image/"+img;
  EVENTS.push({
    id:"lp"+idx, src:"lp", title:e.t, url:"https://t.livepocket.jp"+e.u,
    img, cat: lpCat(e.g||"", e.v||"", e.t), venue: e.v||"", d1: e.d, d2: e.d, time: e.tm, ticket: e.st
  });
});
// eplus (deduped by title+venue at generation time)
(window.EVENTS_EP||[]).forEach((e,idx)=>{
  let d1=null,d2=null;
  const ms=[...(e.dt||"").matchAll(/(\d{4})\/(\d{1,2})\/(\d{1,2})/g)];

    if(ms.length>1){const l=ms[ms.length-1]; d2=`${l[1]}-${String(l[2]).padStart(2,"0")}-${String(l[3]).padStart(2,"0")}`;} else d2=d1; }
  EVENTS.push({ id:"ep"+idx, src:"ep", title:e.t, url:"https://eplus.jp/sf/detail/"+e.u,

    venue:e.v||"", d1, d2, ticket:e.st, noDate:!d1&&(e.dt==="期間中有効"||!e.dt) });
});
// l-tike

});
// pia
(window.EVENTS_PIA||[]).forEach((e,idx)=>{
  const f=s=>{ if(!s) return null; const [y,m,d]=s.split("/"); return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`; };
  EVENTS.push({ id:"pia"+idx, src:"pia", title:e.t, url:"https://t.pia.jp/pia/search_all.do?kw="+encodeURIComponent(e.t.slice(0,20)),
    img:null, cat:e.c||"other", venue:e.v||"", d1:f(e.d1), d2:f(e.d2), ticket:e.st });
});
EVENTS.forEach(e=>{ const g = geocode(e.venue, e.title); e.ll = g.ll; e.approx = g.approx; e.at = g.at; });
window.EVENTS = EVENTS; // debugging/inspection

// ---------- Date helpers ----------
const today = new Date(); today.setHours(0,0,0,0);
function pd(s){ if(!s) return null; const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function status(e){
  const a=pd(e.d1), b=pd(e.d2);
  if(!a) return e.noDate ? {k:"now", label:"開催中"} : {k:"tbd", label:"期間未定"};
  if(b && b<today) return {k:"end", label:"終了"};
  if(a<=today && (!b || b>=today)) return {k:"now", label:"開催中"};
  return {k:"soon", label:"開催予定"};
}
function nextWeekend(){
  const sat = new Date(today); sat.setDate(sat.getDate() + ((6 - sat.getDay() + 7) % 7));
  const sun = new Date(sat); sun.setDate(sat.getDate()+1);
  if (today.getDay()===0) { sat.setTime(today.getTime()); sun.setTime(today.getTime()); }
  return [sat,sun];
}
function overlapsWeekend(e){
  const [sat,sun]=nextWeekend(); const a=pd(e.d1), b=pd(e.d2)||a;
  if(!a) return false; return a<=sun && b>=sat;
}
function fmt(s){ if(!s) return "?"; const [y,m,d]=s.split("-"); return `${+m}/${+d}`; }

// ---------- Map ----------
const map = L.map("map").setView([35.690, 139.735], 12);
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19, attribution:"&copy; OpenStreetMap"}).addTo(map);
const cluster = L.markerClusterGroup({maxClusterRadius:36, showCoverageOnHover:false});
map.addLayer(cluster);

function dot(cat){ return L.divIcon({className:"", html:`<div style="width:16px;height:16px;border-radius:50%;background:${CAT_COLOR[cat]};border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>`, iconSize:[16,16], iconAnchor:[8,8]}); }

function popupHTML(e){
  const st = status(e);
  return `<div class="pop">
    ${e.img?`<img src="${e.img}" loading="lazy" onerror="this.remove()">`:""}
    <div class="t">${e.title}</div>
    <div class="v"><span class="badge" style="background:${CAT_COLOR[e.cat]}">${CAT_LABEL[e.cat]}</span><b class="st-${st.k}">${st.label}</b> ${fmt(e.d1)}${e.d2&&e.d2!==e.d1?"〜"+fmt(e.d2):""}${e.time?" "+e.time:""}</div>
    <div class="v">📍 ${e.at}${e.approx?' <span class="approx">(推定位置)</span>':""}</div>
    <div class="v">${e.venue?e.venue.slice(0,80):""}</div>
    ${e.ticket?`<div class="v">🎫 ${e.ticket}</div>`:""}
    <a href="${e.url}" target="_blank" rel="noopener">詳細ページ ↗</a>
  </div>`;
}

// ---------- Filters ----------
const state = {cats:new Set(["cafe","popup","exhibit","music","idol","stage","classic","other"]), when:"all", srcs:new Set(["cc","lp","ep","lt","pia"]), q:""};
function visible(e){
  if(!state.cats.has(e.cat)) return false;
  if(!state.srcs.has(e.src)) return false;
  const st = status(e);
  if(state.when==="now" && st.k!=="now") return false;
  if(state.when==="weekend" && !overlapsWeekend(e)) return false;
  if(state.when==="upcoming" && st.k!=="soon") return false;
  if(state.when==="all" && st.k==="end") return false; // hide ended by default
  if(state.q){
    const q = state.q.toLowerCase();
    if(!(e.title+" "+e.venue+" "+e.at).toLowerCase().includes(q)) return false;
  }
  return true;
}

const markers = {};
function render(){
  cluster.clearLayers();
  const list = document.getElementById("list");
  list.innerHTML = "";
  const shown = EVENTS.filter(visible).sort((a,b)=>(a.d1||"9999") < (b.d1||"9999") ? -1 : 1);
  shown.forEach(e=>{
    const m = L.marker(e.ll, {icon:dot(e.cat)}).bindPopup(popupHTML(e), {maxWidth:260});
    markers[e.id]=m; cluster.addLayer(m);
    const st = status(e);
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `${e.img?`<img src="${e.img}" loading="lazy" onerror="this.style.visibility='hidden'">`:`<img style="visibility:hidden">`}
      <div><div class="t">${e.title}</div>
      <div class="m"><span class="badge" style="background:${CAT_COLOR[e.cat]}">${CAT_LABEL[e.cat]}</span><b class="st-${st.k}">${st.label}</b> ${fmt(e.d1)}${e.d2&&e.d2!==e.d1?"〜"+fmt(e.d2):""} ・ ${e.at}</div></div>`;
    card.onclick = ()=>{ map.setView(e.ll, 16); m.openPopup(); if(window.innerWidth<=760) document.getElementById("sidebar").classList.remove("open"); };
    list.appendChild(card);
  });
  document.getElementById("count").textContent = `${shown.length} 件のイベント`;
}

document.getElementById("catChips").addEventListener("click", ev=>{
  const c = ev.target.closest(".chip"); if(!c) return;
  c.classList.toggle("on");
  state.cats[c.classList.contains("on")?"add":"delete"](c.dataset.cat);
  render();
});
document.getElementById("whenChips").addEventListener("click", ev=>{
  const c = ev.target.closest(".chip"); if(!c) return;
  document.querySelectorAll("#whenChips .chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); state.when = c.dataset.when; render();
});
document.getElementById("srcChips").addEventListener("click", ev=>{
  const c = ev.target.closest(".chip"); if(!c) return;
  c.classList.toggle("on");
  state.srcs[c.classList.contains("on")?"add":"delete"](c.dataset.src);
  render();
});
document.getElementById("search").addEventListener("input", ev=>{ state.q = ev.target.value.trim(); render(); });
document.getElementById("toggleList").addEventListener("click", ()=>document.getElementById("sidebar").classList.toggle("open"));

render();
</script>
</body>
</html>
